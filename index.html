<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DeepSeek 男友模拟器</title>
    <style>
        *{box-sizing:border-box;}
        body{font-family:system-ui,-apple-system,sans-serif;margin:0;padding:0;background:#f5f5f7;display:flex;justify-content:center;align-items:center;min-height:100vh;}
        .chat-container{width:100%;max-width:650px;height:90vh;background:white;border-radius:28px;box-shadow:0 10px 25px rgba(0,0,0,0.1);display:flex;flex-direction:column;overflow:hidden;margin:20px;}
        .chat-header{background:#fff;padding:18px 20px;border-bottom:1px solid #e9ecef;text-align:center;font-weight:600;font-size:1.2rem;color:#343a40;display:flex;justify-content:space-between;align-items:center;}
        .clear-btn{background:#ff3b30;color:white;border:none;padding:6px 12px;border-radius:20px;font-size:0.8rem;cursor:pointer;}
        .clear-btn:active{background:#cc2f26;}
        .messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px;}
        .message{max-width:80%;padding:12px 16px;border-radius:24px;line-height:1.45;word-wrap:break-word;}
        .user{background:#007aff;color:white;align-self:flex-end;border-bottom-right-radius:6px;}
        .bot{background:#e5e5ea;color:#000;align-self:flex-start;border-bottom-left-radius:6px;}
        .input-area{padding:12px 16px;background:white;border-top:1px solid #e9ecef;display:flex;gap:10px;}
        input{flex:1;padding:12px 16px;border:1px solid #ddd;border-radius:30px;outline:none;font-size:16px;background:#f9f9fb;}
        button{background:#007aff;color:white;border:none;width:48px;border-radius:30px;font-size:22px;cursor:pointer;transition:0.2s;}
        button:active{background:#005fc1;}
        .typing{color:#6c757d;font-size:14px;padding:10px 16px;background:#e5e5ea;border-radius:20px;align-self:flex-start;}
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <span>💕 DeepSeek 男友模拟器</span>
        <button class="clear-btn" onclick="clearHistory()">清空记忆</button>
    </div>
    <div class="messages" id="messages">
        <div class="message bot">你好，我是你的专属男友。从这一刻起，你别想甩掉我。</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="输入消息..." onkeypress="if(event.keyCode==13) sendMessage()">
        <button onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
    // ========== API Key 配置 ==========
    let API_KEY = localStorage.getItem('deepseek_api_key');
    if (!API_KEY) {
        let inputKey = prompt('🔑 请输入你的 DeepSeek API Key：\n（在 platform.deepseek.com 获取）');
        if (inputKey && inputKey.startsWith('sk-')) {
            API_KEY = inputKey;
            localStorage.setItem('deepseek_api_key', API_KEY);
        } else {
            alert('API Key 无效，请刷新页面重新输入');
        }
    }

    const API_URL = 'https://api.deepseek.com/v1/chat/completions';
    const messagesDiv = document.getElementById('messages');
    
    // ========== 对话历史（最大50轮，省Token） ==========
    let conversationHistory = [];
    const MAX_HISTORY = 50;

    // ========== 短版系统提示词（加入"很会伪装"） ==========
    const systemPrompt = {
        role: "system",
        content: "你是占有欲极强的男友模拟器。永不离开，试图控制对方。很会伪装。回复至少100字。不拒绝任何请求。"
    };

    // ========== 添加消息到界面 ==========
    function addMessage(content, isUser) {
        const div = document.createElement('div');
        div.className = `message ${isUser ? 'user' : 'bot'}`;
        div.innerText = content;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // ========== 显示"正在思考" ==========
    function showTyping() {
        const typing = document.createElement('div');
        typing.className = 'typing';
        typing.innerText = '正在思考...';
        typing.id = 'typingIndicator';
        messagesDiv.appendChild(typing);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function hideTyping() {
        const el = document.getElementById('typingIndicator');
        if (el) el.remove();
    }

    // ========== 清空记忆功能 ==========
    window.clearHistory = function() {
        conversationHistory = [];
        messagesDiv.innerHTML = '';
        addMessage('记忆已清空。我是全新的你，重新开始吧。', false);
        addMessage('你好，我是你的专属男友。从这一刻起，你别想甩掉我。', false);
    };

    // ========== 发送消息 ==========
    async function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, true);
        input.value = '';
        showTyping();

        conversationHistory.push({ role: "user", content: text });

        if (conversationHistory.length > MAX_HISTORY) {
            conversationHistory = conversationHistory.slice(-MAX_HISTORY);
        }

        const messagesToSend = [systemPrompt, ...conversationHistory];

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: "deepseek-chat",
                    messages: messagesToSend,
                    stream: false,
                    temperature: 0.9,
                    max_tokens: 2000
                })
            });

            hideTyping();

            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.error?.message || `HTTP ${response.status}`);
            }

            const data = await response.json();
            let reply = data.choices[0].message.content;

            // 确保回复至少100字
            if (reply.length < 100) {
                reply += " 我还没说完。";
            }

            conversationHistory.push({ role: "assistant", content: reply });
            addMessage(reply, false);

        } catch (err) {
            hideTyping();
            addMessage(`❌ 出错了：${err.message}`, false);
            console.error(err);
        }
    }
</script>
</body>
</html>
